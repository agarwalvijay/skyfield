name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Avoid overlapping deploys
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # node 24 → npm 11, matching the lockfile generator. node 20 (npm 10)
          # rejects the vitest/esbuild optional-dep tree as out-of-sync.
          node-version: 24
          cache: npm

      - name: Build PWA
        run: |
          npm ci
          npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${{ secrets.SSH_PORT }}"; PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync build to server
        run: |
          PORT="${{ secrets.SSH_PORT }}"; PORT="${PORT:-22}"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.claude' \
            --exclude 'mobile' \
            --exclude 'src' \
            --exclude 'public' \
            --exclude 'scripts' \
            --exclude '/index.html' \
            --exclude '/tsconfig*' \
            --exclude '/vite.config.ts' \
            --exclude '*.log' \
            -e "ssh -i ~/.ssh/id_deploy -p $PORT -o StrictHostKeyChecking=yes" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Reload pm2
        run: |
          PORT="${{ secrets.SSH_PORT }}"; PORT="${PORT:-22}"
          ssh -i ~/.ssh/id_deploy -p "$PORT" -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -lc '
              set -e
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
              cd "${{ secrets.DEPLOY_PATH }}"
              pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
              pm2 save
            '
